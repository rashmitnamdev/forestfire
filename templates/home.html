<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forest Fire Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#141E30,#243B55);
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:40px;

}

.container{

width:100%;
max-width:900px;

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:0 20px 60px rgba(0,0,0,.35);

}

.header{

padding:35px;

text-align:center;

background:linear-gradient(90deg,#ff512f,#dd2476);

color:white;

}

.header h1{

font-size:36px;

}

.header p{

margin-top:10px;

opacity:.9;

}

form{

padding:40px;

display:grid;

grid-template-columns:1fr 1fr;

gap:22px;

}

.input-group{

display:flex;

flex-direction:column;

}

label{

margin-bottom:8px;

font-weight:500;

color:#444;

}

input{

padding:14px;

border-radius:10px;

border:2px solid #ddd;

font-size:15px;

transition:.3s;

}

input:focus{

outline:none;

border-color:#ff512f;

box-shadow:0 0 12px rgba(255,81,47,.3);

}

.full{

grid-column:1/3;

}

button{

width:100%;

padding:16px;

font-size:18px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#ff512f,#dd2476);

color:white;

cursor:pointer;

transition:.35s;

font-weight:600;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 15px 30px rgba(221,36,118,.35);

}

.result{

margin:30px 40px;

padding:20px;

background:#f6fff7;

border-left:6px solid green;

font-size:22px;

font-weight:600;

border-radius:10px;

text-align:center;

}

.footer{

text-align:center;

padding:20px;

color:gray;

font-size:14px;

}

@media(max-width:768px){

form{

grid-template-columns:1fr;

}

.full{

grid-column:1;

}

.header h1{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🌲 Forest Fire Prediction</h1>

<p>Machine Learning based Forest Fire Weather Index Predictor</p>

</div>

<form action="{{ url_for('predict_datapoint') }}" method="POST">

<div class="input-group">
<label>🌡 Temperature (°C)</label>
<input type="number" step="any" name="Temperature" required>
</div>

<div class="input-group">
<label>💧 Relative Humidity (%)</label>
<input type="number" step="any" name="RH" required>
</div>

<div class="input-group">
<label>💨 Wind Speed (km/h)</label>
<input type="number" step="any" name="Ws" required>
</div>

<div class="input-group">
<label>🌧 Rain (mm)</label>
<input type="number" step="any" name="Rain" required>
</div>

<div class="input-group">
<label>🔥 FFMC</label>
<input type="number" step="any" name="FFMC" required>
</div>

<div class="input-group">
<label>🌿 DMC</label>
<input type="number" step="any" name="DMC" required>
</div>

<div class="input-group">
    <label>🌳 DC</label>
    <input type="number" step="any" name="DC" required>
</div>

<div class="input-group">
<label>🌲 ISI</label>
<input type="number" step="any" name="ISI" required>
</div>

<div class="input-group">
<label>📍 Classes</label>
<input type="number" step="any" name="Classes" required>
</div>

<div class="input-group full">
<label>🗺 Region</label>
<input type="number" step="any" name="Region" required>
</div>

<div class="full">
<button type="submit">🔥 Predict Fire Weather Index</button>
</div>

</form>

{% if results %}

<div class="result">

Predicted FWI : <strong>{{ results }}</strong>

</div>

{% endif %}

<div class="footer">

Developed using Flask • Scikit-Learn • Machine Learning

</div>

</div>

</body>
</html>
